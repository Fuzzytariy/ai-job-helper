server:
  port: 8080

spring:
  application:
    name: ai-job-helper
  
  # 使用H2内存数据库（开发测试用）
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:aijobhelper;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
  
  # 自动执行SQL脚本
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  
  # H2控制台（开发时启用）
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # 避免自动配置Redis/ES等
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 日志配置
logging:
  level:
    com.aijobhelper: debug
